<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap");

    :root {
      color-scheme: dark;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      cursor: default;
      overflow: hidden;
      background: #050505;
    }

    body {
      position: relative;
      font-family: sans-serif;
    }

    #blinds-container {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 10;
      perspective: 800px;
      background: #000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform-style: preserve-3d;
    }

    #blinds-container::before {
      content: "";
      position: absolute;
      top: 0;
      right: 1.2rem;
      width: 0.12rem;
      height: 100%;
      background: linear-gradient(to right, #050505, #141414 50%, #050505);
      box-shadow: 0 0 0.35rem rgba(0, 0, 0, 0.8);
      z-index: 2;
      pointer-events: none;
    }

    #artifact-note {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: min(82vw, 40rem);
      min-height: 22rem;
      padding: 2.25rem 2rem 2rem 3rem;
      box-sizing: border-box;
      background-color: #fdf5d3;
      background-image: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 2.15rem,
        rgba(91, 156, 204, 0.22) 2.15rem,
        rgba(91, 156, 204, 0.22) 2.2rem
      );
      border-left: 0.4rem solid #c94b4b;
      box-shadow:
        0 2.2rem 4.5rem rgba(0, 0, 0, 0.6),
        0 0.35rem 1rem rgba(0, 0, 0, 0.35);
      z-index: 30;
      color: #2d2415;
      font-family: "Caveat", cursive;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
      transform: translate(-50%, 100vh);
      transition: transform 1.5s ease;
      will-change: transform;
    }

    #artifact-note.revealed {
      transform: translate(-50%, -50%);
      top: 50%;
    }

    video,
    canvas {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .blind-slat {
      flex: 1 1 0;
      width: 100%;
      background: linear-gradient(to bottom, #1a1a1a 0%, #232323 55%, #2a2a2a 100%);
      border-bottom: 1px solid #000;
      box-sizing: border-box;
      transform-origin: center top;
      transform: rotateX(-78deg);
      transition: transform 1.1s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 0.28rem 0.6rem rgba(0, 0, 0, 0.55);
      position: relative;
      z-index: 1;
    }

    #blinds-container.closed .blind-slat {
      transform: rotateX(0deg);
    }
  </style>
</head>
<body>
  <video autoplay playsinline muted></video>
  <canvas></canvas>
  <div id="blinds-container"></div>
  <div id="artifact-note"></div>
  <script>
    (() => {
      const video = document.querySelector("video");
      const canvas = document.querySelector("canvas");
      const blindsContainer = document.getElementById("blinds-container");
      const artifactNote = document.getElementById("artifact-note");
      const context = canvas.getContext("2d", { willReadFrequently: true });

      window.currentMotion = 0;
      window.observationLog = [];
      window.isObserving = true;

      let previousFrameData = null;

      for (let index = 0; index < 15; index += 1) {
        const blindSlat = document.createElement("div");
        blindSlat.className = "blind-slat";
        blindsContainer.appendChild(blindSlat);
      }

      window.startWitnessing = async function startWitnessing() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: false,
          });

          video.srcObject = stream;
          await video.play();
          window.triggerObservationLoop();
        } catch {
          return;
        }
      };

      window.triggerObservationLoop = function triggerObservationLoop() {
        if (!window.isObserving) {
          return;
        }

        window.setTimeout(async () => {
          if (!window.isObserving) {
            return;
          }

          const motionString = window.interpretMotion();
          await window.callOllama(motionString);
          window.triggerObservationLoop();
        }, 30000);
      };

      window.captureFrame = function captureFrame() {
        if (!video.videoWidth || !video.videoHeight || !context) {
          return;
        }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        let frameData;

        try {
          frameData = context.getImageData(0, 0, canvas.width, canvas.height).data;
        } catch {
          return;
        }

        if (!previousFrameData) {
          previousFrameData = new Uint8ClampedArray(frameData);
          window.currentMotion = 0;
          return;
        }

        const pixelCount = frameData.length / 4;
        let changedPixels = 0;

        for (let offset = 0; offset < frameData.length; offset += 4) {
          if (
            frameData[offset] !== previousFrameData[offset] ||
            frameData[offset + 1] !== previousFrameData[offset + 1] ||
            frameData[offset + 2] !== previousFrameData[offset + 2] ||
            frameData[offset + 3] !== previousFrameData[offset + 3]
          ) {
            changedPixels += 1;
          }
        }

        window.currentMotion = pixelCount > 0 ? (changedPixels / pixelCount) * 100 : 0;
        previousFrameData = new Uint8ClampedArray(frameData);
      };

      window.interpretMotion = function interpretMotion() {
        const motionScore = Number(window.currentMotion) || 0;

        if (motionScore < 8) {
          return "The mass remains perfectly still.";
        }

        if (motionScore < 25) {
          return "The geometry shifts slightly in the dark.";
        }

        return "The figure displaces a large amount of space.";
      };

      window.callOllama = async function callOllama(sensorData) {
        try {
          const prompt = "You are a cold, forensic observer. Write exactly one single-sentence journal entry in the third person present tense. Never use the words 'you', 'human', or 'person'. Focus only on mass, geometry, light, and duration. Here is the current sensor data: " + sensorData;
          
          const response = await fetch("http://localhost:11434/api/generate", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              model: "llama3.2:3b",
              stream: false,
              prompt: prompt,
            }),
          });

          if (!response.ok) {
            return null;
          }

          const payload = await response.json();
          const observationText = payload?.response ?? "";

          if (observationText) {
            window.observationLog.push(observationText);
          }

          return observationText;
        } catch (error) {
          console.log(error);
          return null;
        }
      };

      function sleep(milliseconds) {
        return new Promise((resolve) => {
          window.setTimeout(resolve, milliseconds);
        });
      }

      async function typeObservationNote(targetElement) {
        const noteText = window.observationLog.join("\n\n");

        targetElement.innerHTML = "";

        for (const character of noteText) {
          if (character === "\n") {
            targetElement.innerHTML += "<br>";
          } else {
            targetElement.innerHTML += character
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;");
          }

          const delay = Math.floor(40 + Math.random() * 51);
          await sleep(delay);
        }
      }

      setInterval(window.captureFrame, 1000);
      window.startWitnessing();

      blindsContainer.addEventListener("click", async () => {
        if (!window.isObserving) {
          return;
        }

        window.isObserving = false;
        blindsContainer.classList.add("closed");

        const stream = video.srcObject;

        if (stream && typeof stream.getTracks === "function") {
          stream.getTracks().forEach((track) => track.stop());
        }

        video.srcObject = null;

        artifactNote.classList.add("revealed");
        await typeObservationNote(artifactNote);
      });

      void video;
      void canvas;
      void blindsContainer;
      void artifactNote;
      void context;
    })();
  </script>
</body>
</html>
