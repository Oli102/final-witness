<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap");

    :root {
      color-scheme: dark;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      cursor: default;
      overflow: hidden;
      background: #050505;
    }

    body {
      position: relative;
      font-family: sans-serif;
    }

    #blinds-container {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 10;
      perspective: 800px;
      background: #000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform-style: preserve-3d;
    }

    #blinds-container::before {
      content: "";
      position: absolute;
      top: 0;
      right: 1.2rem;
      width: 0.12rem;
      height: 100%;
      background: linear-gradient(to right, #050505, #141414 50%, #050505);
      box-shadow: 0 0 0.35rem rgba(0, 0, 0, 0.8);
      z-index: 2;
      pointer-events: none;
    }
    #artifact-note {
      position: relative;
      left: 50%;
      bottom: 0;
      width: min(82vw, 40rem);
      height: 22rem;
      padding: 2.25rem 2rem 3.25rem 3rem;
      box-sizing: border-box;
      background-color: #fdf5d3;
      background-image: repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 2.15rem,
        rgba(91, 156, 204, 0.22) 2.15rem,
        rgba(91, 156, 204, 0.22) 2.2rem
      );
      border-left: 0.4rem solid #c94b4b;
      box-shadow:
        0 2.2rem 4.5rem rgba(0, 0, 0, 0.6),
        0 0.35rem 1rem rgba(0, 0, 0, 0.35);
      z-index: 30;
      color: #2d2415;
      font-family: "Caveat", cursive;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
      transform: translate(-50%, 100vh);
      transition: transform 1.5s ease;
      will-change: transform;
      overflow: hidden;
    }

    #artifact-note.revealed {
      transform: translate(-50%, -50%);
      top: 50%;
    }

    #artifact-content {
      height: 100%;
      overflow: hidden;
      padding-right: 0.5rem;
      box-sizing: border-box;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .artifact-nav {
      position: absolute;
      bottom: 15px;
      font-size: 2rem;
      cursor: pointer;
      color: #222;
      user-select: none;
      font-family: "Caveat", cursive;
      padding: 0.2rem 0.6rem;
      background: rgba(255,255,255,0.0);
    }

    #artifact-prev {
      left: 1rem;
    }

    #artifact-next {
      right: 1rem;
    }

    video,
    canvas {
      position: absolute;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .blind-slat {
      flex: 1 1 0;
      width: 100%;
      background: linear-gradient(to bottom, #1a1a1a 0%, #232323 55%, #2a2a2a 100%);
      border-bottom: 1px solid #000;
      box-sizing: border-box;
      transform-origin: center top;
      transform: rotateX(-78deg);
      transition: transform 1.1s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 0.28rem 0.6rem rgba(0, 0, 0, 0.55);
      position: relative;
      z-index: 1;
    }

    #blinds-container.closed .blind-slat {
      transform: rotateX(0deg);
    }
  </style>
</head>
<body>
  <video autoplay playsinline muted></video>
  <canvas></canvas>
  <div id="blinds-container"></div>
  <div id="artifact-note">
    <div id="artifact-content"></div>
    <span id="artifact-prev" class="artifact-nav">&lt;-</span>
    <span id="artifact-next" class="artifact-nav">-&gt;</span>
  </div>
  <script>
    (() => {
      const video = document.querySelector("video");
      const canvas = document.querySelector("canvas");
      const blindsContainer = document.getElementById("blinds-container");
      const artifactNote = document.getElementById("artifact-note");
      const context = canvas.getContext("2d", { willReadFrequently: true });
      const visionCanvas = document.createElement("canvas");
      const visionContext = visionCanvas.getContext("2d", { willReadFrequently: true });
      const OLLAMA_MODELS = ["moondream:latest", "moondream", "llama3.2-vision:11b", "llama3.2-vision", "llava:7b"];
      const LIVE_OBSERVATION_INTERVAL_MS = 10000;
      const SYSTEM_PROMPT =
        "You are an obsessive, voyeuristic observer. Write a highly detailed, multi-sentence paragraph in the third person present tense. Never use the words 'you', 'human', or 'person'. Focus intensely on micro-movements, the rhythm of the mass expanding and contracting, the angle of the geometry, and how light wraps around it. Show a deep, unsettling fascination and fixation on the subject's subtle shifts. Write at least 4 to 6 sentences. Here is the current sensor data: ";

      window.currentMotion = 0;
      window.observationLog = [];
      window.motionHistory = [];
      window.isObserving = true;
      window.currentPage = 0;
      window.notePages = [];
      window.noteRevealed = false;
      window.lastFrameImage = null;

      let previousFrameData = null;

      for (let index = 0; index < 15; index += 1) {
        const blindSlat = document.createElement("div");
        blindSlat.className = "blind-slat";
        blindsContainer.appendChild(blindSlat);
      }

      window.startWitnessing = async function startWitnessing() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: false,
          });

          video.srcObject = stream;
          await video.play();
          window.captureFrame();
          await window.recordObservation();
          window.triggerObservationLoop();
        } catch {
          return;
        }
      };

      // Pagination helpers for the artifact note
      const artifactContent = document.getElementById("artifact-content");
      const artifactPrev = document.getElementById("artifact-prev");
      const artifactNext = document.getElementById("artifact-next");
      const pageProbe = document.createElement("div");

      pageProbe.style.position = "absolute";
      pageProbe.style.visibility = "hidden";
      pageProbe.style.pointerEvents = "none";
      pageProbe.style.left = "-99999px";
      pageProbe.style.top = "0";
      pageProbe.style.boxSizing = "border-box";
      pageProbe.style.whiteSpace = "pre-wrap";
      pageProbe.style.wordBreak = "break-word";
      pageProbe.style.overflow = "hidden";
      document.body.appendChild(pageProbe);

      window.chunkObservationLogToPages = function chunkObservationLogToPages() {
        const observations = window.observationLog
          .map((s) => (typeof s === "string" ? s.replace(/\s+/g, " ").trim() : String(s)))
          .filter(Boolean);

        if (!observations.length) {
          return [];
        }

        const combinedText = observations.join("\n\n");
        return window.splitTextIntoPages(combinedText);
      };

      window.splitTextIntoPages = function splitTextIntoPages(text) {
        const pages = [];
        const noteWidth = artifactNote.clientWidth - 32;
        const noteHeight = artifactNote.clientHeight;
        const availableHeight = noteHeight - 104;
        const computedStyle = window.getComputedStyle(artifactContent);
        const fontSize = computedStyle.fontSize;
        const fontFamily = computedStyle.fontFamily;
        const lineHeight = computedStyle.lineHeight;
        const lineHeightValue = lineHeight === "normal" ? "1.05" : lineHeight;

        pageProbe.style.width = `${Math.max(100, noteWidth)}px`;
        pageProbe.style.height = `${Math.max(100, availableHeight)}px`;
        pageProbe.style.padding = "0";
        pageProbe.style.fontSize = fontSize;
        pageProbe.style.fontFamily = fontFamily;
        pageProbe.style.lineHeight = lineHeightValue;

        const paragraphs = String(text)
          .replace(/\r\n/g, "\n")
          .split(/\n{2,}/)
          .map((paragraph) => paragraph.replace(/\s+/g, " ").trim())
          .filter(Boolean);

        const splitParagraphIntoPages = (paragraph) => {
          const words = paragraph.split(/\s+/).filter(Boolean);
          let currentPageText = "";

          for (const word of words) {
            const candidate = currentPageText ? `${currentPageText} ${word}` : word;
            pageProbe.textContent = candidate;

            if (pageProbe.scrollHeight > availableHeight && currentPageText) {
              pages.push(currentPageText.trim());
              currentPageText = word;
              pageProbe.textContent = currentPageText;

              if (pageProbe.scrollHeight > availableHeight) {
                const chars = word.split("");
                let partialWord = "";

                for (const character of chars) {
                  const charCandidate = partialWord + character;
                  pageProbe.textContent = charCandidate;

                  if (pageProbe.scrollHeight > availableHeight && partialWord) {
                    pages.push(partialWord);
                    partialWord = character;
                  } else {
                    partialWord = charCandidate;
                  }
                }

                currentPageText = partialWord;
                pageProbe.textContent = currentPageText;
              }
            } else {
              currentPageText = candidate;
            }
          }

          if (currentPageText.trim()) {
            pages.push(currentPageText.trim());
          }
        };

        for (const paragraph of paragraphs) {
          splitParagraphIntoPages(paragraph);
        }

        return pages;
      };

      window.renderPage = async function renderPage(pageIndex, useTypewriter = false) {
        const pages = window.notePages || [];
        if (!pages.length) {
          artifactContent.innerText = "No observations available.";
          artifactPrev.style.display = "none";
          artifactNext.style.display = "none";
          return;
        }

        pageIndex = Math.max(0, Math.min(pageIndex, pages.length - 1));
        window.currentPage = pageIndex;
        const content = pages[pageIndex];

        if (useTypewriter) {
          artifactContent.innerText = "";
          for (let i = 0; i < content.length; i += 1) {
            artifactContent.innerText += content[i];
            // small delay for typewriter feel
            // sleep is declared later but available when invoked
            // eslint-disable-next-line no-await-in-loop
            await sleep(14);
          }
        } else {
          artifactContent.innerText = content;
        }

        // Show or hide nav arrows
        artifactPrev.style.display = pageIndex > 0 ? "block" : "none";
        artifactNext.style.display = pageIndex < pages.length - 1 ? "block" : "none";
      };

      window.buildObservationPrompt = function buildObservationPrompt() {
        return [
          "Describe the visible subject and scene from the camera image in a single detailed paragraph.",
          "Focus on posture, stance, silhouette, clothing, hands, face orientation, hair, lighting, and other visible physical details.",
          "Do not mention motion, displacement, sensors, programs, cameras, or identity.",
          "Use only what is directly visible in the image. Do not infer or assume anything beyond the visible details.",
        ].join("\n");
      };

      window.buildLocalObservationParagraph = function buildLocalObservationParagraph() {
        return [
          "The image is present, but the model did not return a description of the visible subject.",
          "The note remains reserved for the camera-derived observation stream once a vision response arrives.",
        ].join(" ");
      };

      window.recordObservation = async function recordObservation() {
        const observationText = await window.callOllama(
          window.buildObservationPrompt(),
          window.lastFrameImage,
        );

        if (observationText) {
          return observationText;
        }

        const fallbackObservation = window.buildLocalObservationParagraph();
        window.observationLog.push(fallbackObservation);

        return fallbackObservation;
      };

      artifactPrev.addEventListener("click", (e) => {
        e.stopPropagation();
        if (window.currentPage > 0) {
          window.currentPage -= 1;
          void window.renderPage(window.currentPage, false);
        }
      });

      artifactNext.addEventListener("click", (e) => {
        e.stopPropagation();
        if (window.currentPage < (window.notePages.length - 1)) {
          window.currentPage += 1;
          void window.renderPage(window.currentPage, false);
        }
      });

      window.triggerObservationLoop = function triggerObservationLoop() {
        if (!window.isObserving) {
          return;
        }

        window.setTimeout(async () => {
          if (!window.isObserving) {
            return;
          }

          await window.recordObservation();

          window.triggerObservationLoop();
        }, LIVE_OBSERVATION_INTERVAL_MS);
      };

      window.captureFrame = function captureFrame() {
        if (!video.videoWidth || !video.videoHeight || !context) {
          return;
        }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        try {
          const maxDimension = 768;
          const scale = Math.min(1, maxDimension / Math.max(canvas.width, canvas.height));
          visionCanvas.width = Math.max(1, Math.round(canvas.width * scale));
          visionCanvas.height = Math.max(1, Math.round(canvas.height * scale));
          if (visionContext) {
            visionContext.drawImage(canvas, 0, 0, visionCanvas.width, visionCanvas.height);
            window.lastFrameImage = visionCanvas.toDataURL("image/jpeg", 0.75).split(",")[1] || null;
          } else {
            window.lastFrameImage = canvas.toDataURL("image/jpeg", 0.75).split(",")[1] || null;
          }
        } catch {
          window.lastFrameImage = null;
        }

        let frameData;

        try {
          frameData = context.getImageData(0, 0, canvas.width, canvas.height).data;
        } catch {
          return;
        }

        if (!previousFrameData) {
          previousFrameData = new Uint8ClampedArray(frameData);
          window.currentMotion = 0;
          return;
        }

        const pixelCount = frameData.length / 4;
        let changedPixels = 0;

        for (let offset = 0; offset < frameData.length; offset += 4) {
          if (
            frameData[offset] !== previousFrameData[offset] ||
            frameData[offset + 1] !== previousFrameData[offset + 1] ||
            frameData[offset + 2] !== previousFrameData[offset + 2] ||
            frameData[offset + 3] !== previousFrameData[offset + 3]
          ) {
            changedPixels += 1;
          }
        }

        window.currentMotion = pixelCount > 0 ? (changedPixels / pixelCount) * 100 : 0;
        previousFrameData = new Uint8ClampedArray(frameData);
        window.motionHistory.push({
          at: Date.now(),
          score: window.currentMotion,
          description: window.interpretMotion(),
        });

        if (window.motionHistory.length > 60) {
          window.motionHistory.shift();
        }
      };

      window.interpretMotion = function interpretMotion() {
        const motionScore = Number(window.currentMotion) || 0;

        if (motionScore < 8) {
          return "The frame appears visually steady.";
        }

        if (motionScore < 25) {
          return "Small visible changes are present in the frame.";
        }

        return "Strong visible changes are present in the frame.";
      };

      window.buildSessionSummary = function buildSessionSummary() {
        const recentObservations = window.observationLog.slice(-12);

        if (!recentObservations.length) {
          return "No visual observations recorded yet.";
        }

        return recentObservations
          .map((sample) => {
            return `- ${String(sample).replace(/\s+/g, " ").trim()}`;
          })
          .join("\n");
      };

      window.callOllama = async function callOllama(promptText, imageData) {
        const userMessage = {
          role: "user",
          content: promptText,
        };

        if (imageData) {
          userMessage.images = [imageData];
        }

        for (const model of OLLAMA_MODELS) {
          try {
            const response = await fetch("http://localhost:11434/api/chat", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                model,
                system: SYSTEM_PROMPT,
                messages: [userMessage],
                stream: false,
              }),
            });

            if (!response.ok) {
              continue;
            }

            const payload = await response.json();
            const observationText = (payload?.message?.content ?? payload?.response ?? "").trim();

            if (observationText) {
              window.observationLog.push(observationText);
              return observationText;
            }
          } catch {
            continue;
          }
        }

        return null;
      };

      window.generateFinalObservation = async function generateFinalObservation() {
        const sessionSummary = window.buildSessionSummary();
        const prompt = [
          "Session observations:",
          sessionSummary,
          "",
          "Write one concise, direct final observation that summarizes the visible subject using only what is directly seen in the camera image. Focus on posture, silhouette, clothing, hands, face orientation, and lighting.",
        ].join("\n");

        const finalObservation = await window.callOllama(prompt, window.lastFrameImage);

        if (finalObservation) {
          return finalObservation;
        }

        const fallbackObservation = `The session closes with the image still active; ${sessionSummary.replace(/^[-\s]*/, "")}`;
        window.observationLog.push(fallbackObservation);
        return fallbackObservation;
      };

      function sleep(milliseconds) {
        return new Promise((resolve) => {
          window.setTimeout(resolve, milliseconds);
        });
      }

      // Removed on-screen note typing. Observations are logged to the console only.

      setInterval(window.captureFrame, 1000);
      window.startWitnessing();

      blindsContainer.addEventListener("click", async () => {
        if (!window.isObserving) {
          return;
        }
        window.isObserving = false;
        blindsContainer.classList.add("closed");

        // Make one final, immediate call for a lingering final paragraph
        try {
          const finalMotionPrompt =
            "The observation is ending. Write a final, lingering paragraph about the visible subject before the blinds closed. Be descriptive, specific, and focused on posture, silhouette, clothing, hands, face orientation, and lighting.";
          await window.callOllama(finalMotionPrompt, window.lastFrameImage);
        } catch (e) {
          // continue even if final call fails
        }

        const stream = video.srcObject;

        if (stream && typeof stream.getTracks === "function") {
          stream.getTracks().forEach((track) => track.stop());
        }

        video.srcObject = null;

        const finalObservation = await window.generateFinalObservation();

        // Build paginated pages (one paragraph per observation)
        window.notePages = window.chunkObservationLogToPages();
        if (!window.notePages.length && finalObservation) {
          window.notePages = [String(finalObservation).trim()].filter(Boolean);
        }
        window.currentPage = 0;

        // Reveal the note and render page 0 with a typewriter effect the first time
        artifactNote.classList.add("revealed");
        if (!window.noteRevealed) {
          window.noteRevealed = true;
          await window.renderPage(0, true);
        } else {
          void window.renderPage(0, false);
        }

        // Log observations to the console only (no on-screen display).
        console.info("Observation log:", window.observationLog);
        console.info("Final observation:", finalObservation);
      });

      void video;
      void canvas;
      void blindsContainer;
      void artifactNote;
      void context;
    })();
  </script>
</body>
</html>
